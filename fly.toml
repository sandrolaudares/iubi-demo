app = "iubi-demo"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Gateway das APIs IUBI (alcançado pelo servidor; via Tailscale se configurado).
  IUBI_UPSTREAM = "http://100.52.200.210:32200"
  AI_MODEL = "llama-3.1-8b-instant"
  OPENAI_BASE_URL = "https://api.groq.com/openai/v1"
  TAILSCALE_HOSTNAME = "iubi-demo-fly"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
